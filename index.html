<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mermaid Canvas</title>
    <link rel="stylesheet" href="styles.css?v=workspace-controls">
  </head>
  <body>
    <main class="app-shell">
      <section class="gallery-pane" aria-label="Local diagram gallery">
        <header class="gallery-header">
          <div>
            <h2>Local Gallery</h2>
            <p id="folderName">No folder selected</p>
          </div>
        </header>

        <div class="gallery-actions" aria-label="Local folder controls">
          <button id="chooseFolderButton" class="primary-button" type="button">Choose Folder</button>
          <button id="refreshGalleryButton" type="button">Refresh</button>
          <button id="newDiagramButton" type="button">New</button>
          <button id="saveDiagramButton" type="button">Save</button>
          <button id="saveAsDiagramButton" type="button">Save As</button>
        </div>

        <p id="galleryStatus" class="gallery-status" role="status">Choose a folder to show local Mermaid files.</p>
        <div id="galleryGrid" class="gallery-grid" aria-label="Saved Mermaid diagrams"></div>
      </section>

      <section class="editor-pane" aria-label="Mermaid editor">
        <header class="pane-header">
          <div>
            <h1>Mermaid Canvas</h1>
            <p>Paste Mermaid code, save local files, and explore the rendered diagram with unbounded pan and zoom.</p>
          </div>
          <button id="renderButton" class="primary-button" type="button">Render</button>
        </header>

        <label class="editor-label" for="diagramTitle">Diagram title</label>
        <input id="diagramTitle" class="title-input" type="text" value="Untitled Diagram" autocomplete="off">

        <label class="editor-label" for="mermaidInput">Mermaid source</label>
        <textarea id="mermaidInput" spellcheck="false" autocomplete="off">flowchart LR
  A[Paste Mermaid code] --> B{Render}
  B -->|Drag| C[Pan anywhere]
  B -->|Wheel or pinch| D[Zoom without limits]
  C --> E[Export SVG]
  D --> E</textarea>

        <div class="status-row">
          <span id="statusText" role="status">Ready</span>
          <span id="lineCount">5 lines</span>
        </div>
      </section>

      <section class="canvas-pane" aria-label="Rendered Mermaid diagram">
        <div class="canvas-toolbar" aria-label="Canvas controls">
          <button id="toggleGalleryButton" type="button" aria-pressed="false" title="Show or hide the local gallery">Gallery</button>
          <button id="toggleEditorButton" type="button" aria-pressed="false" title="Show or hide the code editor">Code</button>
          <button id="fullscreenButton" type="button" aria-pressed="false" title="Expand the diagram workspace">Full Screen</button>
          <button id="fitButton" type="button" title="Fit diagram to view">Fit</button>
          <button id="resetButton" type="button" title="Reset pan and zoom">Reset</button>
          <button id="copyButton" type="button" title="Copy SVG markup">Copy SVG</button>
          <button id="downloadButton" type="button" title="Download SVG">Download</button>
        </div>
        <div id="viewport" class="viewport">
          <div id="diagramSurface" class="diagram-surface" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script type="module" src="app.js?v=workspace-controls"></script>
  </body>
</html>
